name: Build ESP32 Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e esp32-2432S028

      - name: Collect binaries
        run: |
          mkdir -p out
          cp .pio/build/esp32-2432S028/firmware.bin out/
          cp .pio/build/esp32-2432S028/bootloader.bin out/
          cp .pio/build/esp32-2432S028/partitions.bin out/

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ble-spam-esp32-firmware
          path: out/*.bin
